<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Matthew Kilcoyne — The Confluation Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1a1a1a;
      --surface-3: #222;
      --border: #2a2a2a;
      --text: #f0ece4;
      --text-dim: #8a8680;
      --text-muted: #5a5652;
      --accent: #c9a96e;
      --accent-dim: #8b7a4f;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'Inter', -apple-system, system-ui, sans-serif;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      touch-action: manipulation;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Welcome Screen ───────────────────────────── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-top: calc(2rem + var(--safe-top));
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    .welcome-logo {
      width: 80px;
      height: 80px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    .welcome-logo svg {
      width: 32px;
      height: 32px;
      color: var(--accent);
    }

    .welcome h1 {
      font-family: var(--serif);
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome .subtitle {
      font-size: 0.85rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .welcome .description {
      max-width: 320px;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text-dim);
      margin-bottom: 3rem;
    }

    .language-selector {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      padding: 0.6rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .language-selector label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .language-selector select {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }

    .language-selector select option {
      background: var(--surface);
      color: var(--text);
    }

    .start-btn {
      padding: 1rem 3rem;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: var(--bg);
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      touch-action: manipulation;
    }

    .start-btn:active {
      transform: scale(0.96);
    }

    .offline-badge {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .offline-dot {
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
      animation: blink 2s ease infinite;
    }

    /* ── Interview Screen ─────────────────────────── */
    .interview {
      flex: 1;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.5s ease;
    }

    .interview-header {
      padding: 0.75rem 1.25rem;
      padding-top: calc(0.75rem + var(--safe-top));
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chapter-label {
      font-size: 0.65rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .question-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      height: 2px;
      background: var(--surface-2);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .messages::-webkit-scrollbar { width: 0; }

    .msg {
      display: flex;
      gap: 0.75rem;
      max-width: 92%;
      animation: slideUp 0.4s ease;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.6rem;
      font-family: var(--serif);
      font-style: italic;
    }

    .msg.bot .msg-avatar {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--accent);
    }

    .msg.user .msg-avatar {
      background: var(--accent);
      color: var(--bg);
      font-style: normal;
      font-weight: 600;
    }

    .msg-bubble {
      padding: 0.9rem 1.1rem;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .msg.bot .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .msg.user .msg-bubble {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: var(--bg);
      border-bottom-right-radius: 4px;
    }

    .typing {
      display: flex;
      gap: 0.75rem;
      max-width: 92%;
      animation: fadeIn 0.3s ease;
    }

    .typing-dots {
      padding: 0.9rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typingBounce 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    .input-area {
      padding: 0.75rem 1rem;
      padding-bottom: calc(0.75rem + var(--safe-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 0.4rem 0.4rem 0.4rem 1.2rem;
      transition: border-color 0.2s ease;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent-dim);
    }

    .input-wrapper textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.92rem;
      line-height: 1.5;
      resize: none;
      outline: none;
      min-height: 24px;
      max-height: 120px;
      padding: 0.4rem 0;
    }

    .input-wrapper textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s ease;
      touch-action: manipulation;
    }

    .send-btn:disabled {
      opacity: 0.2;
      cursor: default;
    }

    .send-btn:not(:disabled):active {
      transform: scale(0.9);
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      color: var(--bg);
    }

    .input-meta {
      text-align: center;
      font-size: 0.65rem;
      color: var(--text-muted);
      padding-top: 0.5rem;
      letter-spacing: 0.05em;
    }

    /* ── Report Screen ────────────────────────────── */
    .report {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1.25rem;
      padding-top: calc(2rem + var(--safe-top));
      padding-bottom: calc(2rem + var(--safe-bottom));
      animation: fadeIn 0.8s ease;
      -webkit-overflow-scrolling: touch;
    }

    .report h1 {
      font-family: var(--serif);
      font-size: 1.8rem;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .report-section {
      margin-top: 2rem;
      padding: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .report-section h2 {
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.75rem;
      letter-spacing: 0.02em;
    }

    .report-section p {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text-dim);
    }

    .report-thesis {
      margin-top: 2.5rem;
      padding: 1.5rem;
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
      border: 1px solid var(--accent-dim);
      border-radius: 16px;
      text-align: center;
    }

    .report-thesis h2 {
      font-family: var(--serif);
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 1rem;
    }

    .report-thesis p {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-style: italic;
      line-height: 1.6;
      color: var(--text);
    }

    .restart-btn {
      display: block;
      width: 100%;
      margin-top: 2rem;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-dim);
      font-family: var(--sans);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .restart-btn:active {
      background: var(--surface-2);
    }

    /* ── Loading ──────────────────────────────────── */
    .loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      animation: fadeIn 0.5s ease;
    }

    .loading-orb {
      width: 60px;
      height: 60px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    .loading p {
      font-size: 0.85rem;
      color: var(--text-dim);
      text-align: center;
      max-width: 240px;
      line-height: 1.6;
    }

    /* ── Animations ───────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(201, 169, 110, 0.1); }
      50% { box-shadow: 0 0 40px rgba(201, 169, 110, 0.25); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/app.js"></script>
</body>
</html>
